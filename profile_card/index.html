<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Profile Card</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    </head>
    <body>
        <div class="container">
            <div class="image">
                <img class="profile-image" src="./image.png" alt="profile image">
            </div>

            <div class="text">
                <span class="name">CodingLab</span>
                <span class="job">YouTuber & Blogger</span>
            </div>

            <div class="media-buttons">
                <a href="#"   style="background-color: #1877F2;" class="link">
                  <i class="bi bi-facebook"></i>
                </a>
                <a href="#"   style="background-color:#1DA1F2 ;"class="link">
                    <i class="bi bi-twitter"></i>
                </a>
                <a href="#"  style="background-color: #c13584;" class="link">
                   <i class="bi bi-instagram"></i>
                </a>
                <a href="#"  style="background-color:#FF0000 ;" class="link">
                   <i class="bi bi-youtube"></i>
                </a>
            </div>

            <div class="buttons">
                <button class="button">Subscribe</button>
                <button class="button">Message</button>
            </div>

            <div class="analytics">
                <div class="data">
                    <i class="bi bi-hand-thumbs-up"></i>
                    <span class="number">60k</span>
                </div>

                <div class="data">
                   <i class="bi bi-chat"></i>
                    <span class="number">20k</span>
                </div>

                <div class="data">
                    <i class="bi bi-share"></i>
                    <span class="number">40k</span>
                </div>

               
            </div>
        </div>
    </body>
</html>
