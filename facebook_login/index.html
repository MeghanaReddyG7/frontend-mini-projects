<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>login-page-2</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="page">
            <div class="title">
                <h2>Facebook</h2>
                <p>Connect With Friends and  the World <br>Around You With Facebook</p>
            </div>
            <div class="login">
                <form action="#">
                    <div class=input-box>  
                        <input type="email" placeholder="Email or phone number" required>
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <div class="box">
                        <button class="btn">Log In </button> 
                    </div>
                                                      
                    <div class="forgot">
                        <p><a href="#"> Forgot Password?</a></p>
                    </div>
                    <hr>
                    <div class="submit">
                        <button class="create" type="submit">Create new Account</button>
                    </div>
                    
                </form>
            </div>
        </div>
        </div>
    </body>
</html>
