<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login page 4 </title>
        <meta name="viewport" content="width=device-width,intial-scale=1.0">
        <link rel="stylesheet" href="./styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    </head>
    <body>
        <div class="login-container">
            <H2>Login form </H2>
            <div class="input">  
                <input class="text" type="email" placeholder="Email or phone" required >
                <i class="bi bi-person-fill"></i>              
            </div>
            <div class="input">              
            <input class="text" type="password" placeholder="password" required >
            <i class="bi bi-lock-fill"></i>               
            </div>
            <div class="forgot">
                <p class="fg"><a href="#">Forgot password?</a></p>
            </div>
            <div class="login">
                <button class="btn" type="submit">Login</button>
            </div>
            
            <div class="member">
                <p class="mem">Not a member? <a href="#">Signup now </a></p>
            </div>

        </div>
    </body>
</html>
